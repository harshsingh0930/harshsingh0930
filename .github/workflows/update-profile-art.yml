name: Update profile art

on:
  schedule:
    - cron: "17 6 * * *"
  workflow_dispatch:
  push:
    branches:
      - main

permissions:
  contents: write

jobs:
  heatmap:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          pip install -r scripts/requirements.txt

      - name: Fetch contribution data
        run: |
          python scripts/fetch_contributions.py

      - name: Generate animated heatmap
        run: |
          python scripts/generate_streak_svg.py harshsingh0930 contrib-heatmap.svg

      - name: Generate info card
        run: |
          python scripts/make_info_card.py

      - name: Commit generated files
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "chore: refresh profile art [skip ci]"
          file_pattern: |
            data/contributions.json
            contrib-heatmap.svg
            info-card.svg
