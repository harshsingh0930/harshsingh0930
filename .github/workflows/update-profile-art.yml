name: Update profile art

on:
  schedule:
    - cron: "17 6 * * *"
  workflow_dispatch:
  push:
    branches: [main, master]

permissions:
  contents: write

jobs:
  heatmap:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r scripts/requirements.txt

      - name: Fetch contribution data
        run: python scripts/fetch_contributions.py

      - name: Generate animated heatmap
        run: python scripts/generate_streak_svg.py harshsingh0930 contrib-heatmap.svg

      - name: Generate info card
        run: python scripts/make_info_card.py

      - name: Force Commit Everything
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "chore: refresh profile art" || echo "No changes to commit"
          git push
